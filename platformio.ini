; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; === Memory configuration for 16MB Flash + 8MB PSRAM ===
board_build.flash_mode = dio
board_build.psram_type = opi          ; Octal PSRAM (common for N16R8)
board_build.arduino.memory_type = dio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv   ; or min_spiffs for more app space

build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM=1              ; Explicitly enable PSRAM
    -D LEDC_CHANNEL=0                 ; For buzzer PWM

lib_deps = 
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4 ; LCD
    ; Add TFLite Micro library when ready (e.g., espressif or community Arduino_TensorFlowLite_ESP32)